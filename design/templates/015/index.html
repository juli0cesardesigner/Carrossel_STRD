<body>

  <script>
    // Injetar a logo e o top-info no topo de todos os slides
    const topInfoVal = getComputedStyle(document.documentElement).getPropertyValue('--top-info').replace(/"/g, '').trim();
    const headers = document.querySelectorAll('.slide-header');
    headers.forEach(header => {
      if (header.querySelector('.header-left')) return;

      const headerLeft = document.createElement('div');
      headerLeft.className = 'header-left';

      const img = document.createElement('img');
      img.src = './images/logo.svg';
      img.className = 'top-logo';

      const textSpan = document.createElement('span');
      textSpan.className = 'top-info-text';
      textSpan.textContent = topInfoVal;

      headerLeft.appendChild(img);
      headerLeft.appendChild(textSpan);
      header.insertBefore(headerLeft, header.firstChild);
    });

    // Injetar as camadas de textura global em todos os slides
    document.querySelectorAll('.slide').forEach(slide => {
      const textureHtml = `
        <div class="texture-3-b"></div>
        <div class="texture-3-m"></div>
        <div class="texture-3-t"></div>
        <div class="layer-texture-middle"></div>
        <div class="layer-texture-top"></div>
      `;
      slide.insertAdjacentHTML('beforeend', textureHtml);
    });

    async function loadCopyData() {
      try {
        const response = await fetch('./copy_gold_standard_015.md');
        if (!response.ok) {
           const fallbackResponse = await fetch('../../copy_gold_standard_015.md');
           if (!fallbackResponse.ok) {
             console.warn("Falha ao carregar o arquivo copy_gold_standard_015.md");
             return;
           }
           var text = await fallbackResponse.text();
        } else {
           var text = await response.text();
        }
        
        const lines = text.split('\n');
        const dataMap = {};
        let currentKey = null;
        
        lines.forEach(line => {
          const match = line.match(/^(txt\d+)\s*-\s*(.*)/);
          if (match) {
            currentKey = match[1];
            dataMap[currentKey] = match[2].trim();
          } else if (currentKey && line.trim().length > 0 && !line.startsWith('#')) {
            // Concatena as linhas seguintes com <br>
            dataMap[currentKey] += '<br>' + line.trim();
          }
        });

        const textElements = document.querySelectorAll('.slide-content h1, .slide-content p');
        textElements.forEach(el => {
          const key = el.textContent.trim();
          if (dataMap[key]) {
            if (key === 'txt7') {
              // Fatiando o txt7 em spans individuais para efeito gradiente/desfoque/peso
              const parts = dataMap[key].split('<br>');
              let newHtml = '';
              parts.forEach((part, index) => {
                newHtml += `<span class="txt7-line txt7-line-${index + 1}">${part}</span>`;
              });
              el.innerHTML = newHtml;
            } else if (key === 'txt8') {
              // Aplica a cor laranja no texto marcado com asteriscos (*texto*)
              el.innerHTML = dataMap[key].replace(/\*(.*?)\*/g, '<span class="text-orange">$1</span>');
            } else {
              el.innerHTML = dataMap[key];
            }
          }
        });

        // ----------------------------------------------------
        // Função Efeito Poster-Fit (Apenas para o txt1 no Slide 1)
        // ----------------------------------------------------
        function applyPosterFit(selector, maxSize, minSize, maxLines) {
          const titleEl = document.querySelector(selector);
          if (!titleEl) return;
          
          const originalText = titleEl.innerHTML.replace(/<br\s*[\/]?>/gi, '\n');
          const forcedLines = originalText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
          const words = originalText.split(/\s+/).filter(w => w.length > 0);
          
          const targetWidth = titleEl.clientWidth; // Já desconta as margens
          
          if (words.length > 0 && targetWidth > 0) {
            // Cria div invisível para medir larguras a 10px
            const measureDiv = document.createElement('div');
            measureDiv.style.position = 'absolute';
            measureDiv.style.visibility = 'hidden';
            measureDiv.style.whiteSpace = 'nowrap';
            measureDiv.style.fontSize = '10px';
            const compStyle = window.getComputedStyle(titleEl);
            measureDiv.style.fontFamily = compStyle.fontFamily;
            measureDiv.style.fontWeight = compStyle.fontWeight;
            measureDiv.style.textTransform = compStyle.textTransform;
            document.body.appendChild(measureDiv);

            const getWidth = (text) => {
              measureDiv.textContent = text;
              return measureDiv.scrollWidth;
            };

            let bestLines = [];
            
            if (forcedLines.length > 1) {
              bestLines = forcedLines; // Respeita quebra manual se existir
            } else {
              // Tenta descobrir a melhor forma de separar em 1, 2 ou 3 linhas
              let bestScore = Infinity;
              
              for (let k = 1; k <= Math.min(words.length, maxLines); k++) {
                if (k === 1) {
                  const txt = words.join(' ');
                  const reqSize = (targetWidth / getWidth(txt)) * 10;
                  if (reqSize >= minSize) {
                    bestLines = [txt];
                    bestScore = 0; // 1 linha sempre é a melhor se couber
                    break;
                  }
                } else if (k === 2) {
                  for (let i = 1; i < words.length; i++) {
                    const l1 = words.slice(0, i).join(' ');
                    const l2 = words.slice(i).join(' ');
                    const s1 = (targetWidth / getWidth(l1)) * 10;
                    const s2 = (targetWidth / getWidth(l2)) * 10;
                    
                    if (s1 >= minSize && s2 >= minSize) {
                      const score = Math.abs(s1 - s2);
                      if (score < bestScore) {
                        bestScore = score;
                        bestLines = [l1, l2];
                      }
                    }
                  }
                } else if (k === 3) {
                  for (let i = 1; i < words.length - 1; i++) {
                    for (let j = i + 1; j < words.length; j++) {
                      const l1 = words.slice(0, i).join(' ');
                      const l2 = words.slice(i, j).join(' ');
                      const l3 = words.slice(j).join(' ');
                      const s1 = (targetWidth / getWidth(l1)) * 10;
                      const s2 = (targetWidth / getWidth(l2)) * 10;
                      const s3 = (targetWidth / getWidth(l3)) * 10;
                      
                      if (s1 >= minSize && s2 >= minSize && s3 >= minSize) {
                        const score = Math.max(s1, s2, s3) - Math.min(s1, s2, s3);
                        if (score < bestScore) {
                          bestScore = score;
                          bestLines = [l1, l2, l3];
                        }
                      }
                    }
                  }
                }
              }
              
              if (bestLines.length === 0) {
                const chunk = Math.ceil(words.length / maxLines);
                for (let i = 0; i < words.length; i += chunk) {
                  bestLines.push(words.slice(i, i + chunk).join(' '));
                }
              }
            }

            titleEl.innerHTML = '';
            titleEl.style.wordBreak = 'normal'; 
            
            bestLines.forEach(text => {
              const div = document.createElement('div');
              div.textContent = text;
              div.style.whiteSpace = 'nowrap';
              div.style.lineHeight = '0.85'; 
              div.style.margin = '0';
              
              let s = (targetWidth / getWidth(text)) * 10;
              if (s > maxSize) s = maxSize;
              
              div.style.fontSize = s + 'px';
              titleEl.appendChild(div);
            });
            
            document.body.removeChild(measureDiv);
          }
        }

        // Aplicando o Poster Fit no txt1 (aumentei o maxSize para 200 para permitir que palavras curtas cheguem até as bordas)
        applyPosterFit('#slide-1 h1.title-large', 200, 20, 5);

        // ----------------------------------------------------
        // Função Auto-Fit (Reduz as fontes proporcionalmente para caber)
        // ----------------------------------------------------
        function autoFitSlideText(slideId, maxAllowedHeight = 370) {
          const slide = document.querySelector(slideId);
          if (!slide) return;
          const slideContent = slide.querySelector('.slide-content');
          if (!slideContent) return;

          // Limpa qualquer transform que tenha sido colocado
          slideContent.style.transform = '';
          slideContent.style.transformOrigin = '';

          const elements = Array.from(slideContent.querySelectorAll('h1, p'));
          
          // Captura os estilos originais
          const originalStyles = elements.map(el => {
            el.style.removeProperty('font-size');
            el.style.removeProperty('margin-top');
            el.style.removeProperty('margin-bottom');
            el.style.removeProperty('line-height');
            
            const style = window.getComputedStyle(el);
            return {
              element: el,
              baseFontSize: parseFloat(style.fontSize) || 16,
              baseMarginTop: parseFloat(style.marginTop) || 0,
              baseMarginBottom: parseFloat(style.marginBottom) || 0,
              baseLineHeight: style.lineHeight && style.lineHeight !== 'normal' && style.lineHeight.endsWith('px') ? parseFloat(style.lineHeight) : null
            };
          });

          // Função para calcular a altura real ocupada pelas fontes e margens
          function getContentHeight() {
            let totalHeight = 0;
            elements.forEach(el => {
              const rect = el.getBoundingClientRect();
              totalHeight += rect.height;
              const style = window.getComputedStyle(el);
              const marginTop = parseFloat(style.marginTop) || 0;
              const marginBottom = parseFloat(style.marginBottom) || 0;
              totalHeight += marginTop + marginBottom;
            });
            return totalHeight;
          }

          let scaleFactor = 1.0;
          const minScale = 0.35;
          let safeLoop = 0;

          function applyScale(sf) {
            originalStyles.forEach(item => {
              const newFontSize = item.baseFontSize * sf;
              item.element.style.setProperty('font-size', `${newFontSize}px`, 'important');
              
              const newMarginTop = item.baseMarginTop * sf;
              item.element.style.setProperty('margin-top', `${newMarginTop}px`, 'important');
              
              const newMarginBottom = item.baseMarginBottom * sf;
              item.element.style.setProperty('margin-bottom', `${newMarginBottom}px`, 'important');

              if (item.baseLineHeight) {
                item.element.style.setProperty('line-height', `${item.baseLineHeight * sf}px`, 'important');
              }
            });
          }

          // Loop reduzindo proporcionalmente até caber no limite de altura
          while (getContentHeight() > maxAllowedHeight && scaleFactor > minScale && safeLoop < 100) {
            scaleFactor -= 0.02;
            applyScale(scaleFactor);
            safeLoop++;
          }
        }

        function fitTxt4InSlide2() {
          const wrapper = document.querySelector('#slide-2 .txt4-wrapper');
          const el = document.querySelector('#slide-2 h1.title-large');
          const txt3 = document.querySelector('#slide-2 p.desc:first-of-type');
          const txt5 = document.querySelector('#slide-2 p.desc:last-of-type');
          if (!wrapper || !el) return;

          // Limpa propriedades inline anteriores
          el.style.removeProperty('font-size');
          if (txt3) {
            txt3.style.removeProperty('font-size');
          }
          if (txt5) {
            txt5.style.removeProperty('font-size');
          }

          // Lê dinamicamente os tamanhos originais definidos pelo CSS
          const baseFontSize = parseFloat(window.getComputedStyle(el).fontSize) || 52;

          // Define as restrições baseadas no CSS do wrapper
          const maxWidth = 356; // 432px - 38px*2
          const maxHeight = parseFloat(window.getComputedStyle(wrapper).height) || 260;
          
          let low = 10;
          let high = 200;
          let optimalSize = baseFontSize;

          // Busca binária para o tamanho de fonte ideal de txt4
          for (let i = 0; i < 30; i++) {
            const mid = (low + high) / 2;
            el.style.setProperty('font-size', `${mid}px`, 'important');
            
            const rect = el.getBoundingClientRect();
            const currentHeight = rect.height;
            const currentWidth = el.scrollWidth;

            if (currentHeight <= maxHeight && currentWidth <= maxWidth) {
              optimalSize = mid;
              low = mid + 0.1;
            } else {
              high = mid - 0.1;
            }
          }

          // Aplica o tamanho final para txt4
          el.style.setProperty('font-size', `${optimalSize}px`, 'important');
        }

        function fitTxt7InSlide4() {
          const el = document.querySelector('#slide-4 p.desc');
          if (!el) return;

          // Limpa propriedades inline anteriores
          el.style.removeProperty('font-size');

          // Lê dinamicamente o tamanho original definido pelo CSS
          const baseFontSize = parseFloat(window.getComputedStyle(el).fontSize) || 16;

          // Define as restrições
          const maxWidth = 356; // 432px - 38px*2
          const maxHeight = 360; // 900px na escala original (900 * 0.4)
          
          let low = 5;
          let high = 150;
          let optimalSize = baseFontSize;

          // Busca binária para o tamanho de fonte ideal de txt7
          for (let i = 0; i < 30; i++) {
            const mid = (low + high) / 2;
            el.style.setProperty('font-size', `${mid}px`, 'important');
            
            const rect = el.getBoundingClientRect();
            const currentHeight = rect.height;
            const currentWidth = el.scrollWidth;

            if (currentHeight <= maxHeight && currentWidth <= maxWidth) {
              optimalSize = mid;
              low = mid + 0.1;
            } else {
              high = mid - 0.1;
            }
          }

          // Aplica o tamanho final para txt7
          el.style.setProperty('font-size', `${optimalSize}px`, 'important');
        }

        function fitTxt8InSlide5() {
          const wrapper = document.querySelector('#slide-5 .txt8-wrapper');
          const el = document.querySelector('#slide-5 h1.title-large');
          if (!wrapper || !el) return;

          el.style.removeProperty('font-size');
          const baseFontSize = parseFloat(window.getComputedStyle(el).fontSize) || 52;

          const maxWidth = 356; 
          const maxHeight = parseFloat(window.getComputedStyle(wrapper).height) || 260;
          
          let low = 10;
          let high = 200;
          let optimalSize = baseFontSize;

          for (let i = 0; i < 30; i++) {
            const mid = (low + high) / 2;
            el.style.setProperty('font-size', `${mid}px`, 'important');
            
            const rect = el.getBoundingClientRect();
            if (rect.height <= maxHeight && el.scrollWidth <= maxWidth) {
              optimalSize = mid;
              low = mid + 0.1;
            } else {
              high = mid - 0.1;
            }
          }

          el.style.setProperty('font-size', `${optimalSize}px`, 'important');
        }

        function fitTxt10InSlide6() {
          const wrapper = document.querySelector('#slide-6 .txt10-wrapper');
          const el = document.querySelector('#slide-6 h1.title-large');
          if (!wrapper || !el) return;

          el.style.removeProperty('font-size');
          const baseFontSize = parseFloat(window.getComputedStyle(el).fontSize) || 52;

          const maxWidth = 356; 
          const maxHeight = parseFloat(window.getComputedStyle(wrapper).height) || 260;
          
          let low = 10;
          let high = 200;
          let optimalSize = baseFontSize;

          for (let i = 0; i < 30; i++) {
            const mid = (low + high) / 2;
            el.style.setProperty('font-size', `${mid}px`, 'important');
            
            const rect = el.getBoundingClientRect();
            if (rect.height <= maxHeight && el.scrollWidth <= maxWidth) {
              optimalSize = mid;
              low = mid + 0.1;
            } else {
              high = mid - 0.1;
            }
          }

          el.style.setProperty('font-size', `${optimalSize}px`, 'important');
        }

        function fitTxt11InSlide7() {
          const wrapper = document.querySelector('#slide-7 .txt11-wrapper');
          const el = document.querySelector('#slide-7 h1.title-large');
          const group = document.querySelector('#slide-7 .txt11-group');
          if (!wrapper || !el || !group) return;

          el.style.removeProperty('font-size');
          const baseFontSize = parseFloat(window.getComputedStyle(el).fontSize) || 52;

          const maxWidth = 356; 
          const maxHeight = parseFloat(window.getComputedStyle(wrapper).height) || 260;
          
          let low = 10;
          let high = 200;
          let optimalSize = baseFontSize;

          for (let i = 0; i < 30; i++) {
            const mid = (low + high) / 2;
            el.style.setProperty('font-size', `${mid}px`, 'important');
            
            const currentHeight = group.getBoundingClientRect().height;
            if (currentHeight <= maxHeight && el.scrollWidth <= maxWidth) {
              optimalSize = mid;
              low = mid + 0.1;
            } else {
              high = mid - 0.1;
            }
          }

          el.style.setProperty('font-size', `${optimalSize}px`, 'important');
        }

        // Aplicando o auto-fit de fonte nos slides relevantes
        fitTxt4InSlide2();
        fitTxt7InSlide4();
        fitTxt8InSlide5();
        fitTxt10InSlide6();
        fitTxt11InSlide7();

      } catch (error) {
        console.error("Erro no fetch. Detalhes:", error);
      }
    }
    
    loadCopyData();
    window.isReady = true;
  </script>
