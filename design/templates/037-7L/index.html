  <script>
    // Injetar a logo e o top-info no topo de todos os slides
    const topInfoVal = getComputedStyle(document.documentElement).getPropertyValue('--top-info').replace(/"/g, '').trim();
    const headers = document.querySelectorAll('.slide-header');
    headers.forEach(header => {
      if (header.querySelector('.header-left')) return;

      const headerLeft = document.createElement('div');
      headerLeft.className = 'header-left';

      const img = document.createElement('img');
      img.src = './images/logo.svg';
      img.className = 'top-logo';

      const textSpan = document.createElement('span');
      textSpan.className = 'top-info-text';
      textSpan.textContent = topInfoVal;

      headerLeft.appendChild(img);
      headerLeft.appendChild(textSpan);
      header.insertBefore(headerLeft, header.firstChild);
    });

    // Injetar a informação do topo no último slide se houver
    const lastTopInfo = document.querySelector('.last-top-info');
    if (lastTopInfo) {
      lastTopInfo.textContent = topInfoVal;
    }

    // Injetar a camada de textura global em todos os slides com flips alternados
    document.querySelectorAll('.slide').forEach((slide, index) => {
      let transformStyle = '';
      const mode = index % 4;
      if (mode === 1) {
        transformStyle = 'style="transform: scaleX(-1);"';
      } else if (mode === 2) {
        transformStyle = 'style="transform: scaleY(-1);"';
      } else if (mode === 3) {
        transformStyle = 'style="transform: scale(-1, -1);"';
      }

      const textureHtml = `
        <div class="layer-texture-up" ${transformStyle}></div>
      `;
      slide.insertAdjacentHTML('beforeend', textureHtml);
    });

    async function loadCopyData() {
      try {
        const response = await fetch('./copy_gold_standard_037_7L.md');
        if (!response.ok) {
           const fallbackResponse = await fetch('../../copy_gold_standard_037_7L.md');
           if (!fallbackResponse.ok) {
             console.warn("Falha ao carregar o arquivo copy_gold_standard_037_7L.md");
             return;
           }
           var text = await fallbackResponse.text();
        } else {
           var text = await response.text();
        }

        const lines = text.split('\n');
        const dataMap = {};
        let currentKey = null;

        lines.forEach(line => {
          const match = line.match(/^(txt\d+)\s*-\s*(.*)/);
          if (match) {
            currentKey = match[1];
            dataMap[currentKey] = match[2].trim();
          } else if (currentKey && line.trim().length > 0 && !line.startsWith('#')) {
            // Concatena as linhas seguintes com <br>
            dataMap[currentKey] += '<br>' + line.trim();
          }
        });

        const textElements = document.querySelectorAll('.slide-content h1, .slide-content p');
        textElements.forEach(el => {
          const key = el.textContent.trim();
          if (dataMap[key]) {
            // Aplica a cor especial no texto marcado com asteriscos (*texto*)
            el.innerHTML = dataMap[key].replace(/\*(.*?)\*/g, '<span class="text-orange">$1</span>');
          }
        });

        // ----------------------------------------------------
        // Função Efeito Poster-Fit (txt1 no Slide 1)
        // ----------------------------------------------------
        function applyPosterFit(selector, maxSize, minSize, maxLines) {
          const titleEl = document.querySelector(selector);
          if (!titleEl) return;

          const originalText = titleEl.innerHTML.replace(/<br\s*[\/]?>/gi, '\n');
          const forcedLines = originalText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
          const words = originalText.split(/\s+/).filter(w => w.length > 0);

          const targetWidth = titleEl.clientWidth;

          if (words.length > 0 && targetWidth > 0) {
            const measureDiv = document.createElement('div');
            measureDiv.style.position = 'absolute';
            measureDiv.style.visibility = 'hidden';
            measureDiv.style.whiteSpace = 'nowrap';
            measureDiv.style.fontSize = '10px';
            const compStyle = window.getComputedStyle(titleEl);
            measureDiv.style.fontFamily = compStyle.fontFamily;
            measureDiv.style.fontWeight = compStyle.fontWeight;
            measureDiv.style.textTransform = compStyle.textTransform;
            document.body.appendChild(measureDiv);

            const getWidth = (text) => {
              measureDiv.textContent = text;
              return measureDiv.scrollWidth;
            };

            let bestLines = [];

            if (forcedLines.length > 1) {
              bestLines = forcedLines;
            } else {
              let bestScore = Infinity;

              for (let k = 1; k <= Math.min(words.length, maxLines); k++) {
                if (k === 1) {
                  const txt = words.join(' ');
                  const reqSize = (targetWidth / getWidth(txt)) * 10;
                  if (reqSize >= minSize) {
                    bestLines = [txt];
                    bestScore = 0;
                    break;
                  }
                } else if (k === 2) {
                  for (let i = 1; i < words.length; i++) {
                    const l1 = words.slice(0, i).join(' ');
                    const l2 = words.slice(i).join(' ');
                    const s1 = (targetWidth / getWidth(l1)) * 10;
                    const s2 = (targetWidth / getWidth(l2)) * 10;

                    if (s1 >= minSize && s2 >= minSize) {
                      const score = Math.abs(s1 - s2);
                      if (score < bestScore) {
                        bestScore = score;
                        bestLines = [l1, l2];
                      }
                    }
                  }
                } else if (k === 3) {
                  for (let i = 1; i < words.length - 1; i++) {
                    for (let j = i + 1; j < words.length; j++) {
                      const l1 = words.slice(0, i).join(' ');
                      const l2 = words.slice(i, j).join(' ');
                      const l3 = words.slice(j).join(' ');
                      const s1 = (targetWidth / getWidth(l1)) * 10;
                      const s2 = (targetWidth / getWidth(l2)) * 10;
                      const s3 = (targetWidth / getWidth(l3)) * 10;

                      if (s1 >= minSize && s2 >= minSize && s3 >= minSize) {
                        const score = Math.max(s1, s2, s3) - Math.min(s1, s2, s3);
                        if (score < bestScore) {
                          bestScore = score;
                          bestLines = [l1, l2, l3];
                        }
                      }
                    }
                  }
                }
              }

              if (bestLines.length === 0) {
                const chunk = Math.ceil(words.length / maxLines);
                for (let i = 0; i < words.length; i += chunk) {
                  bestLines.push(words.slice(i, i + chunk).join(' '));
                }
              }
            }

            titleEl.innerHTML = '';
            titleEl.style.wordBreak = 'normal';

            bestLines.forEach(text => {
              const div = document.createElement('div');
              div.textContent = text;
              div.style.whiteSpace = 'nowrap';
              div.style.lineHeight = '0.85';
              div.style.margin = '0';

              let s = (targetWidth / getWidth(text)) * 10;
              if (s > maxSize) s = maxSize;

              div.style.fontSize = s + 'px';
              titleEl.appendChild(div);
            });

            document.body.removeChild(measureDiv);
          }
        }

        // ----------------------------------------------------
        // Função para encontrar a redução ideal (em pt) para slides 2 a 7
        // ----------------------------------------------------
        function findOptimalReduction(slideId, maxAllowedHeight = 404) {
          const slide = document.querySelector(slideId);
          if (!slide) return 0;
          const slideContent = slide.querySelector('.slide-content');
          if (!slideContent) return 0;

          const elements = Array.from(slideContent.querySelectorAll('h1, p'));
          if (elements.length === 0) return 0;

          // Salva os estilos inline para restaurar após a medição
          const originalInlineStyles = elements.map(el => ({
            element: el,
            fontSize: el.style.fontSize,
            marginTop: el.style.marginTop,
            marginBottom: el.style.marginBottom,
            lineHeight: el.style.lineHeight
          }));

          // Limpa temporariamente os estilos inline
          elements.forEach(el => {
            el.style.removeProperty('font-size');
            el.style.removeProperty('margin-top');
            el.style.removeProperty('margin-bottom');
            el.style.removeProperty('line-height');
          });

          const originalStyles = elements.map(el => {
            const style = window.getComputedStyle(el);
            return {
              element: el,
              baseFontSizePt: 96, // 96pt para título e suporte neste template
              baseMarginTop: parseFloat(style.marginTop) || 0,
              baseMarginBottom: parseFloat(style.marginBottom) || 0,
              baseLineHeight: style.lineHeight && style.lineHeight !== 'normal' && style.lineHeight.endsWith('px') ? parseFloat(style.lineHeight) : null
            };
          });

          function getContentHeight() {
            let totalHeight = 0;
            elements.forEach(el => {
              const rect = el.getBoundingClientRect();
              totalHeight += rect.height;
              const style = window.getComputedStyle(el);
              const marginTop = parseFloat(style.marginTop) || 0;
              const marginBottom = parseFloat(style.marginBottom) || 0;
              totalHeight += marginTop + marginBottom;
            });
            return totalHeight;
          }

          const ptToPxFactor = 0.5333; // Escala de visualização de 40%
          let d = 0;
          const maxD = 45;

          function applyReduction(reductionPt) {
            originalStyles.forEach(item => {
              const ptSize = item.baseFontSizePt - reductionPt;
              const pxSize = ptSize * ptToPxFactor;
              item.element.style.setProperty('font-size', `${pxSize}px`, 'important');

              const sf = (96 - reductionPt) / 96;
              item.element.style.setProperty('margin-top', `${item.baseMarginTop * sf}px`, 'important');
              item.element.style.setProperty('margin-bottom', `${item.baseMarginBottom * sf}px`, 'important');

              if (item.baseLineHeight) {
                item.element.style.setProperty('line-height', `${item.baseLineHeight * sf}px`, 'important');
              }
            });
          }

          applyReduction(d);
          let safeLoop = 0;
          while (getContentHeight() > maxAllowedHeight && d < maxD && safeLoop < 100) {
            d += 1;
            applyReduction(d);
            safeLoop++;
          }

          // Restaura os estilos inline
          originalInlineStyles.forEach(style => {
            style.element.style.fontSize = style.fontSize;
            style.element.style.marginTop = style.marginTop;
            style.element.style.marginBottom = style.marginBottom;
            style.element.style.lineHeight = style.lineHeight;
          });

          return d;
        }

        // ----------------------------------------------------
        // Função para aplicar a redução uniforme (em pt) a slides 2 a 7
        // ----------------------------------------------------
        function applyUniformReduction(reductionPt) {
          const ptToPxFactor = 0.5333;
          for (let i = 2; i <= 7; i++) {
            const slide = document.querySelector(`#slide-${i}`);
            if (!slide) continue;
            const slideContent = slide.querySelector('.slide-content');
            if (!slideContent) continue;

            const elements = Array.from(slideContent.querySelectorAll('h1, p'));
            elements.forEach(el => {
              el.style.removeProperty('font-size');
              el.style.removeProperty('margin-top');
              el.style.removeProperty('margin-bottom');
              el.style.removeProperty('line-height');

              const style = window.getComputedStyle(el);
              const baseFontSizePt = 70; // 96pt para título e suporte
              const baseMarginTop = parseFloat(style.marginTop) || 0;
              const baseMarginBottom = parseFloat(style.marginBottom) || 0;
              const baseLineHeight = style.lineHeight && style.lineHeight !== 'normal' && style.lineHeight.endsWith('px') ? parseFloat(style.lineHeight) : null;

              const ptSize = baseFontSizePt - reductionPt;
              const pxSize = ptSize * ptToPxFactor;
              el.style.setProperty('font-size', `${pxSize}px`, 'important');

              const sf = (96 - reductionPt) / 96;
              el.style.setProperty('margin-top', `${baseMarginTop * sf}px`, 'important');
              el.style.setProperty('margin-bottom', `${baseMarginBottom * sf}px`, 'important');

              if (baseLineHeight) {
                el.style.setProperty('line-height', `${baseLineHeight * sf}px`, 'important');
              }
            });
          }
        }

        // Aguarda o carregamento de todas as fontes para medições precisas
        document.fonts.ready.then(() => {
          // 1. Poster Fit no txt1 (Slide 1)
          applyPosterFit('#slide-1 h1.title-large', 200, 20, 5);

          // 2. Calculando a redução uniforme ideal para os slides 2 a 7
          let maxD = 0;
          for (let i = 2; i <= 7; i++) {
            const d = findOptimalReduction(`#slide-${i}`, 404);
            if (d > maxD) {
              maxD = d;
            }
          }

          // 3. Aplicando a mesma redução uniforme a todos os slides de 2 a 7
          applyUniformReduction(maxD);
        });

      } catch (error) {
        console.error("Erro no fetch. Detalhes:", error);
      }
    }

    loadCopyData();
