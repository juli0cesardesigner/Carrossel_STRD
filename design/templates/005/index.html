  <script>
    async function loadCopyData() {
      try {
        const response = await fetch('./copy_gold_standard_005.md');
        if (!response.ok) {
           // Tenta fallback com caminho relativo caso o servidor esteja configurado diferente
           const fallbackResponse = await fetch('../../copy_gold_standard_005.md');
           if (!fallbackResponse.ok) {
             console.warn("Falha ao carregar o arquivo copy_gold_standard_005.md");
             return;
           }
           var text = await fallbackResponse.text();
        } else {
           var text = await response.text();
        }
        
        const lines = text.split('\n');
        const dataMap = {};
        
        lines.forEach(line => {
          // Expressão mais flexível: ignora espaços/caracteres antes do txtN
          const match = line.match(/(txt\d+)\s*-\s*(.*)/);
          if (match) {
            dataMap[match[1]] = match[2].trim();
          }
        });

        const textElements = document.querySelectorAll('.slide-content h1, .slide-content p');
        textElements.forEach(el => {
          const key = el.textContent.trim();
          if (dataMap[key]) {
            el.innerHTML = dataMap[key];
          }
        });

        // Injetar a logo e o top-info no topo de todos os slides
        const topInfoVal = getComputedStyle(document.documentElement).getPropertyValue('--top-info').replace(/"/g, '').trim();
        const headers = document.querySelectorAll('.slide-header');
        headers.forEach(header => {
          if (header.querySelector('.header-left')) return;

          const headerLeft = document.createElement('div');
          headerLeft.className = 'header-left';

          const img = document.createElement('img');
          img.src = './images/logo.svg';
          img.className = 'top-logo';

          const textSpan = document.createElement('span');
          textSpan.className = 'top-info-text';
          textSpan.textContent = topInfoVal;

          headerLeft.appendChild(img);
          headerLeft.appendChild(textSpan);
          header.insertBefore(headerLeft, header.firstChild);
        });

        // ----------------------------------------------------
        // Função Efeito Poster-Fit (Usada nos Slides 1, 3, 5, 7, 9)
        // ----------------------------------------------------
        function applyPosterFit(selector, maxSize, minSize, maxLines) {
          const titleEl = document.querySelector(selector);
          if (!titleEl) return;
          
          const originalText = titleEl.innerHTML.replace(/<br\s*[\/]?>/gi, '\n');
          const forcedLines = originalText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
          const words = originalText.split(/\s+/).filter(w => w.length > 0);
          
          const targetWidth = titleEl.clientWidth; // Já desconta as margens
          
          if (words.length > 0 && targetWidth > 0) {
            // Cria div invisível para medir larguras a 10px
            const measureDiv = document.createElement('div');
            measureDiv.style.position = 'absolute';
            measureDiv.style.visibility = 'hidden';
            measureDiv.style.whiteSpace = 'nowrap';
            measureDiv.style.fontSize = '10px';
            const compStyle = window.getComputedStyle(titleEl);
            measureDiv.style.fontFamily = compStyle.fontFamily;
            measureDiv.style.fontWeight = compStyle.fontWeight;
            measureDiv.style.textTransform = compStyle.textTransform;
            document.body.appendChild(measureDiv);

            const getWidth = (text) => {
              measureDiv.textContent = text;
              return measureDiv.scrollWidth;
            };

            let bestLines = [];
            
            if (forcedLines.length > 1) {
              bestLines = forcedLines; // Respeita quebra manual se existir
            } else {
              // Tenta descobrir a melhor forma de separar em 1, 2 ou 3 linhas
              let bestScore = Infinity;
              
              for (let k = 1; k <= Math.min(words.length, maxLines); k++) {
                if (k === 1) {
                  const txt = words.join(' ');
                  const reqSize = (targetWidth / getWidth(txt)) * 10;
                  if (reqSize >= minSize) {
                    bestLines = [txt];
                    bestScore = 0; // 1 linha sempre é a melhor se couber
                    break;
                  }
                } else if (k === 2) {
                  for (let i = 1; i < words.length; i++) {
                    const l1 = words.slice(0, i).join(' ');
                    const l2 = words.slice(i).join(' ');
                    const s1 = (targetWidth / getWidth(l1)) * 10;
                    const s2 = (targetWidth / getWidth(l2)) * 10;
                    
                    if (s1 >= minSize && s2 >= minSize) {
                      const score = Math.abs(s1 - s2);
                      if (score < bestScore) {
                        bestScore = score;
                        bestLines = [l1, l2];
                      }
                    }
                  }
                } else if (k === 3) {
                  for (let i = 1; i < words.length - 1; i++) {
                    for (let j = i + 1; j < words.length; j++) {
                      const l1 = words.slice(0, i).join(' ');
                      const l2 = words.slice(i, j).join(' ');
                      const l3 = words.slice(j).join(' ');
                      const s1 = (targetWidth / getWidth(l1)) * 10;
                      const s2 = (targetWidth / getWidth(l2)) * 10;
                      const s3 = (targetWidth / getWidth(l3)) * 10;
                      
                      if (s1 >= minSize && s2 >= minSize && s3 >= minSize) {
                        const score = Math.max(s1, s2, s3) - Math.min(s1, s2, s3);
                        if (score < bestScore) {
                          bestScore = score;
                          bestLines = [l1, l2, l3];
                        }
                      }
                    }
                  }
                }
              }
              
              // Se nenhuma combinação funcionou, força quebra bruta
              if (bestLines.length === 0) {
                const chunk = Math.ceil(words.length / maxLines);
                for (let i = 0; i < words.length; i += chunk) {
                  bestLines.push(words.slice(i, i + chunk).join(' '));
                }
              }
            }

            // Renderiza as linhas equalizadas
            titleEl.innerHTML = '';
            titleEl.style.wordBreak = 'normal'; 
            
            bestLines.forEach(text => {
              const div = document.createElement('div');
              div.textContent = text;
              div.style.whiteSpace = 'nowrap';
              div.style.lineHeight = '0.85'; 
              div.style.margin = '0';
              
              let s = (targetWidth / getWidth(text)) * 10;
              if (s > maxSize) s = maxSize;
              
              // Removemos a trava rígida de minSize na hora de renderizar.
              // Se a matemática disser que precisa de 20px pra caber, ele vai usar 20px, 
              // garantindo que NUNCA transborde a tela lateralmente.
              
              div.style.fontSize = s + 'px';
              titleEl.appendChild(div);
            });
            
            document.body.removeChild(measureDiv);
          }
        }

        // Aplica o Poster-Fit nos textos principais (Apenas Slide 1)
        ['#slide-1'].forEach(slideId => {
          applyPosterFit(`${slideId} h1.title-large`, 64, 36, 3);
        });

        // ----------------------------------------------------
        // Função Efeito Standard Auto-Fit (Ajuste Simples)
        // Usada para textos que apenas precisam caber sem o efeito Poster
        // ----------------------------------------------------
        function applyStandardAutoFit(selectors, maxSize, minSize) {
          const els = document.querySelectorAll(selectors);
          els.forEach(el => {
            const content = el.closest('.slide-content');
            if (el && content) {
              let currentSize = maxSize;
              el.style.fontSize = currentSize + 'px';
              
              const getLineCount = () => {
                const computedStyle = window.getComputedStyle(el);
                let lineHeight = parseFloat(computedStyle.lineHeight);
                if (isNaN(lineHeight)) lineHeight = currentSize * 1.2; 
                return Math.round(el.clientHeight / lineHeight);
              };

              // Reduz até que caiba no container (ou atinja o mínimo)
              while (content.scrollHeight > content.clientHeight && currentSize > minSize) {
                currentSize -= 1;
                el.style.fontSize = currentSize + 'px';
              }
            }
          });
        }

        // Textos de apoio dos demais slides
        // Fonte mínima 60pt (24px), Máxima 100pt (40px)
        applyStandardAutoFit('#slide-1 p.desc, #slide-2 p.desc, #slide-4 p.desc, #slide-5 p.desc, #slide-6 p.desc, #slide-8 p.desc', 40, 24);

        // Títulos dos slides de conteúdo (demais slides)
        // Fonte mínima 1rem (16px), Máxima 2rem (32px)
        applyStandardAutoFit('#slide-2 h1.title-large, #slide-4 h1.title-large, #slide-5 h1.title-large, #slide-6 h1.title-large, #slide-8 h1.title-large', 32, 16);

        // SLIDE 10 - Textos menores (redução de ~30%)
        applyStandardAutoFit('#slide-10 h1.title-large', 22, 20);
        applyStandardAutoFit('#slide-10 p.desc', 22, 20);

        // Oculta imagens de background quebradas e seu overlay sólido correspondente
        document.querySelectorAll('.layer-image').forEach(img => {
          const handleBrokenImage = () => {
            img.style.display = 'none';
            const slide = img.closest('.slide');
            if (slide) {
              const solidOverlay = slide.querySelector('.layer-color-solid');
              if (solidOverlay) {
                solidOverlay.style.display = 'none';
              }
            }
          };
          
          if (img.complete) {
            if (img.naturalWidth === 0) {
              handleBrokenImage();
            }
          } else {
            img.addEventListener('error', handleBrokenImage);
          }
        });

      } catch (error) {
        console.error("Erro no fetch. Detalhes:", error);
      }
    }
    
    // Tentar executar logo de cara e também no load
    loadCopyData();
window.isReady = true;
  </script>
